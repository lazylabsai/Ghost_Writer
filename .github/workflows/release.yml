name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CSC_SKIP_SIGNING: true

jobs:
  # ─── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
          cache: 'npm'

      - name: Install Rust Toolchain (Windows)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install Dependencies
        run: npm ci

      - name: Build Native Audio Module (Windows)
        working-directory: electron/native
        run: npx @napi-rs/cli build --platform --release --target x86_64-pc-windows-msvc

      - name: Install Native App Dependencies (Windows)
        run: npx electron-builder install-app-deps --platform win32 --arch x64

      - name: Build Windows Installer
        run: npm run dist -- --win -c.extraMetadata.version=${{ github.event.inputs.version }}

      - name: Upload Windows Setup to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Create release if it doesn't exist
          gh release view "v${{ github.event.inputs.version }}" || gh release create "v${{ github.event.inputs.version }}" --title "Ghost Writer v${{ github.event.inputs.version }}" --generate-notes
          
          # Upload the Windows executable
          gh release upload "v${{ github.event.inputs.version }}" artifacts/*.exe --clobber

          # Upload optional AI runtime bundle used by packaged installs
          if [ -f ai-runtime.zip ]; then gh release upload "v${{ github.event.inputs.version }}" ai-runtime.zip --clobber; fi
          
          # Upload auto-updater files if they were generated
          if ls release/*.blockmap 1> /dev/null 2>&1; then gh release upload "v${{ github.event.inputs.version }}" release/*.blockmap --clobber; fi
          if ls release/latest.yml 1> /dev/null 2>&1; then gh release upload "v${{ github.event.inputs.version }}" release/latest.yml --clobber; fi

  # ─── macOS Build ─────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (.dmg + .zip)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Toolchain (macOS ARM64)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Install Dependencies
        run: npm ci

      - name: Build Native Audio Module (macOS)
        working-directory: electron/native
        run: npx @napi-rs/cli build --platform --release --target aarch64-apple-darwin

      - name: Download pre-compiled Whisper Binaries (macOS)
        run: |
          mkdir -p assets/whisper-bin
          echo "Downloading pre-compiled whisper.cpp binaries..."

          # Try downloading pre-built ARM64 binary release
          curl -L "https://github.com/ggerganov/whisper.cpp/releases/download/v1.7.2/whisper-blas-bin-arm64.zip" \
            -o whisper.zip --fail --silent || \
          curl -L "https://github.com/ggerganov/whisper.cpp/releases/latest/download/whisper-blas-bin-arm64.zip" \
            -o whisper.zip --silent || echo "Pre-built binary not found, skipping."

          if [ -f "whisper.zip" ]; then
            unzip -j whisper.zip "*/main" "*/server" -d assets/whisper-bin/ 2>/dev/null || true
          fi

          # Rename binaries to match expected names
          [ -f "assets/whisper-bin/main" ] && mv assets/whisper-bin/main assets/whisper-bin/whisper-cli || true
          [ -f "assets/whisper-bin/server" ] && mv assets/whisper-bin/server assets/whisper-bin/whisper-server || true

          # Make executable regardless
          chmod +x assets/whisper-bin/* 2>/dev/null || true
          echo "Whisper binary setup complete."

      - name: Install Native App Dependencies (macOS ARM64)
        run: npx electron-builder install-app-deps --platform darwin --arch arm64

      - name: Build macOS Installer
        run: npm run dist -- --mac --arm64 -c.extraMetadata.version=${{ github.event.inputs.version }}

      - name: Upload macOS Executable to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Create release if it doesn't exist
          gh release view "v${{ github.event.inputs.version }}" || gh release create "v${{ github.event.inputs.version }}" --title "Ghost Writer v${{ github.event.inputs.version }}" --generate-notes
          
          # Upload the macOS installers
          gh release upload "v${{ github.event.inputs.version }}" artifacts/*.dmg artifacts/*.zip --clobber
          
          # Upload auto-updater files if they were generated
          if ls release/*.blockmap 1> /dev/null 2>&1; then gh release upload "v${{ github.event.inputs.version }}" release/*.blockmap --clobber; fi
          if ls release/latest-mac.yml 1> /dev/null 2>&1; then gh release upload "v${{ github.event.inputs.version }}" release/latest-mac.yml --clobber; fi

  publish-release-metadata:
    name: Publish Release Metadata
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "v${{ github.event.inputs.version }}" --dir release-assets

      - name: Generate release manifest and checksums
        run: node scripts/collect_release_artifacts.js
        env:
          RELEASE_INPUT_DIR: release-assets

      - name: Upload metadata to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ github.event.inputs.version }}" artifacts/release-manifest.json artifacts/checksums.txt artifacts/release-notes.md --clobber
